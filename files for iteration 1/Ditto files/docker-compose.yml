# =============================================================================
# SDV Iteration 1 - Full Pipeline Docker Compose
# =============================================================================
# Pipeline: Vehicle Data Source -> Kuksa -> Zenoh -> Ditto -> OpenSOVD
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f            # Follow all logs
#   docker compose run --rm simulator # Run the 36s vehicle simulation
#   docker compose down               # Stop everything
# =============================================================================

networks:
  sdv-network:
    driver: bridge

services:
  # ===========================================================================
  # 1. Eclipse Kuksa Databroker - Vehicle Data Abstraction Layer
  # ===========================================================================
  kuksa:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:main
    container_name: kuksa
    ports:
      - "55555:55555"
    volumes:
      - ./OBD.json:/OBD.json:ro
    command: ["--insecure", "--vss", "/OBD.json"]
    networks:
      - sdv-network

  # ===========================================================================
  # 2. Eclipse Zenoh Router - Distributed Data Transport
  # ===========================================================================
  zenoh:
    image: eclipse/zenoh:latest
    container_name: zenoh
    ports:
      - "7447:7447"
    networks:
      - sdv-network

  # ===========================================================================
  # 3. MongoDB - Backend storage for Eclipse Ditto
  # ===========================================================================
  mongodb:
    image: docker.io/mongo:7.0
    container_name: mongodb
    deploy:
      resources:
        limits:
          memory: 256m
    restart: always
    command: mongod --storageEngine wiredTiger --noscripting
    user: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      sdv-network:
        aliases:
          - mongodb

  # ===========================================================================
  # 4. Eclipse Ditto - Digital Twin Backend
  #    Ditto runs as multiple microservices + nginx reverse proxy
  # ===========================================================================

  policies:
    image: docker.io/eclipse/ditto-policies:${DITTO_VERSION:-latest}
    container_name: ditto-policies
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      sdv-network:
        aliases:
          - ditto-cluster
    environment:
      - TZ=UTC
      - BIND_HOSTNAME=0.0.0.0
      - JAVA_TOOL_OPTIONS=-XX:ActiveProcessorCount=2 -XX:+ExitOnOutOfMemoryError -XX:+UseContainerSupport -Xss512k -XX:MaxRAMPercentage=50 -XX:+UseG1GC -Dpekko.coordinated-shutdown.exit-jvm=on -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s -Dpekko.cluster.failure-detector.threshold=15.0 -Dpekko.cluster.failure-detector.expected-response-after=10s -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s -Dpekko.cluster.downing-provider-class=
      - MONGO_DB_HOSTNAME=mongodb
    depends_on:
      - mongodb
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s

  things:
    image: docker.io/eclipse/ditto-things:${DITTO_VERSION:-latest}
    container_name: ditto-things
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      sdv-network:
        aliases:
          - ditto-cluster
    environment:
      - TZ=UTC
      - BIND_HOSTNAME=0.0.0.0
      - JAVA_TOOL_OPTIONS=-XX:ActiveProcessorCount=2 -XX:+ExitOnOutOfMemoryError -XX:+UseContainerSupport -Xss512k -XX:MaxRAMPercentage=50 -XX:+UseG1GC -Dpekko.coordinated-shutdown.exit-jvm=on -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s -Dpekko.cluster.failure-detector.threshold=15.0 -Dpekko.cluster.failure-detector.expected-response-after=10s -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s -Dpekko.cluster.downing-provider-class=
      - MONGO_DB_HOSTNAME=mongodb
    depends_on:
      - policies
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s

  things-search:
    image: docker.io/eclipse/ditto-things-search:${DITTO_VERSION:-latest}
    container_name: ditto-things-search
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      sdv-network:
        aliases:
          - ditto-cluster
    environment:
      - TZ=UTC
      - BIND_HOSTNAME=0.0.0.0
      - JAVA_TOOL_OPTIONS=-XX:ActiveProcessorCount=2 -XX:+ExitOnOutOfMemoryError -XX:+UseContainerSupport -Xss512k -XX:MaxRAMPercentage=50 -XX:+UseG1GC -Dpekko.coordinated-shutdown.exit-jvm=on -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s -Dpekko.cluster.failure-detector.threshold=15.0 -Dpekko.cluster.failure-detector.expected-response-after=10s -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s -Dpekko.cluster.downing-provider-class=
      - MONGO_DB_HOSTNAME=mongodb
    depends_on:
      - policies
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s

  connectivity:
    image: docker.io/eclipse/ditto-connectivity:${DITTO_VERSION:-latest}
    container_name: ditto-connectivity
    deploy:
      resources:
        limits:
          memory: 768m
    restart: always
    networks:
      sdv-network:
        aliases:
          - ditto-cluster
    environment:
      - TZ=UTC
      - BIND_HOSTNAME=0.0.0.0
      - JAVA_TOOL_OPTIONS=-XX:ActiveProcessorCount=2 -XX:+ExitOnOutOfMemoryError -XX:+UseContainerSupport -Xss512k -XX:MaxRAMPercentage=50 -XX:+UseG1GC -Dpekko.coordinated-shutdown.exit-jvm=on -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s -Dpekko.cluster.failure-detector.threshold=15.0 -Dpekko.cluster.failure-detector.expected-response-after=10s -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s -Dpekko.cluster.downing-provider-class=
      - MONGO_DB_HOSTNAME=mongodb
    depends_on:
      - policies
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s

  gateway:
    image: docker.io/eclipse/ditto-gateway:${DITTO_VERSION:-latest}
    container_name: ditto-gateway
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      sdv-network:
        aliases:
          - ditto-cluster
    depends_on:
      - policies
    environment:
      - TZ=UTC
      - BIND_HOSTNAME=0.0.0.0
      - ENABLE_PRE_AUTHENTICATION=true
      - JAVA_TOOL_OPTIONS=-XX:ActiveProcessorCount=2 -XX:+ExitOnOutOfMemoryError -XX:+UseContainerSupport -Xss512k -XX:MaxRAMPercentage=50 -XX:+UseG1GC -Dpekko.coordinated-shutdown.exit-jvm=on -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s -Dpekko.cluster.failure-detector.threshold=15.0 -Dpekko.cluster.failure-detector.expected-response-after=10s -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s -Dpekko.cluster.downing-provider-class=
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s

  # --- Nginx reverse proxy for Ditto API (port 8080) ---
  ditto-nginx:
    image: docker.io/nginx:1.27-alpine
    container_name: ditto-nginx
    deploy:
      resources:
        limits:
          memory: 32m
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.htpasswd:/etc/nginx/nginx.htpasswd:ro
    ports:
      - "8080:80"
    depends_on:
      - gateway
    networks:
      - sdv-network

  # ===========================================================================
  # 5. Kuksa-to-Zenoh Bridge
  # ===========================================================================
  kuksa-to-zenoh:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: kuksa-to-zenoh
    depends_on:
      - kuksa
      - zenoh
    environment:
      - KUKSA_HOST=kuksa
      - KUKSA_PORT=55555
    networks:
      - sdv-network
    restart: on-failure

  # ===========================================================================
  # 6. Ditto Adapter - Zenoh-to-Ditto Bridge
  # ===========================================================================
  ditto-adapter:
    build:
      context: .
      dockerfile: Dockerfile.adapter
    container_name: ditto-adapter
    depends_on:
      - ditto-nginx
      - zenoh
    environment:
      - DITTO_BASE_URL=http://ditto-nginx:80/api/2/things
      - ZENOH_TOPIC=vehicle/vehicle-21/telemetry
    networks:
      - sdv-network
    restart: on-failure

  # ===========================================================================
  # 7. OpenSOVD Diagnostic API
  # ===========================================================================
  diagnostic-api:
    build:
      context: .
      dockerfile: Dockerfile.diagnostic
    container_name: diagnostic-api
    ports:
      - "20002:20002"
    depends_on:
      - ditto-nginx
    environment:
      - DITTO_URL=http://ditto-nginx:80/api/2/things/vehicle-21
    networks:
      - sdv-network
    restart: on-failure

  # ===========================================================================
  # 8. Vehicle Data Simulator (run manually: docker compose run --rm simulator)
  # ===========================================================================
  simulator:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: simulator
    entrypoint: ["python", "/app/send_obd_data_to_kuksa.py"]
    depends_on:
      - kuksa
    environment:
      - KUKSA_HOST=kuksa
      - KUKSA_PORT=55555
    networks:
      - sdv-network
    profiles:
      - simulate

volumes:
  mongo-data:
